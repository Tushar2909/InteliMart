spring.application.name=IntelliMart

# DB config
spring.datasource.url=jdbc:mysql://localhost:3306/intellimart?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# Fix for springdoc / OpenAPI NPE with PathPatternParser
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Limit what springdoc scans (optional, prevents scanning third-party handlers)
springdoc.packages-to-scan=com.intellimart

# Development notes
# spring.jpa.hibernate.ddl-auto=create-drop
# default server port 8080
